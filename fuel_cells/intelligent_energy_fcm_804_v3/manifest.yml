blueprint_spec: device/3.0

display_name: Intelligent Energy FCM 804
description: Fuel Cell Module uses hydrogen gas to provide electrical DC power
icon: enapter-fuel-cell
license: MIT
author: enapter
support:
  url: https://go.enapter.com/enapter-blueprint-support
  email: support@enapter.com

implements:
  - energy.fuel_cell
  - lib.energy.fuel_cell.energy.lifetime
  - lib.energy.fuel_cell.output.current_limit
  - lib.energy.fuel_cell.output.voltage_setpoint
  - lib.energy.fuel_cell.run_hours.lifetime

runtime:
  type: lua
  requirements:
    - can
    - relay
  options:
    dir: src

configuration:
  can:
    display_name: CAN Connection
    description: Fuel cell CAN connection parameters
    access_level: owner
    parameters:
      can_index:
        display_name: CAN Index
        description: CAN Index is pre-configured on a factory, you can obtain it from your device vendor.
        type: integer
        required: true
        default: 1
      save_0x400:
        display_name: Troubleshooting Mode
        description: Save troubleshooting CAN messages (0x400) for further analysis by Intelligent Energy service team.
        type: boolean
        default: false
      can_connection_uri:
        display_name: CAN Bus Connection URI
        description: Connection URI for accessing the CAN bus (e.g., gio://enp-can-1/can)
        type: string
        format: connection_uri
        required: true
  relay:
    display_name: Relay Connection
    description: Fuel cell relay connection parameters
    access_level: owner
    parameters:
      power_relay_connection_uri:
        display_name: Power Relay Connection URI
        description: Connection URI for the relay module controlling power (e.g., gio://enp-rl6-1/relay)
        type: string
        format: connection_uri
        required: true
      power_rl_ch:
        display_name: Power Relay Channel
        description: The number of a relay channel to which an FC power contact is connected.
        type: integer
        required: true
        min: 1
        max: 6
      start_relay_connection_uri:
        display_name: Start Relay Connection URI
        description: Connection URI for the relay module controlling start (e.g., gio://enp-rl6-2/relay)
        type: string
        format: connection_uri
        required: true
      start_rl_ch:
        display_name: Start Relay Channel
        description: The number of a relay channel to which an FC start contact is connected.
        type: integer
        required: true
        min: 1
        max: 6

properties:
  vendor:
    type: string
    display_name: Vendor
  model:
    type: string
    display_name: Model
  serial_number:
    type: string
    display_name: Serial Number
  fw_ver:
    type: string
    display_name: Firmware Version

telemetry:
  fuel_cell_status:
    display_name: Fuel Cell Status
    type: string
    description: Current operational status of the fuel cell.
    enum:
      idle:
        display_name: Idle
        description: >-
          Powered on and ready to start. No active power generation or
          transitional process in progress.
      starting:
        display_name: Starting
        description: >-
          Startup sequence in progress. May include gas line purging,
          pressurization, and temperature ramp phases before power
          generation begins.
      running:
        display_name: Running
        description: Actively generating electrical power.
      stopping:
        display_name: Stopping
        description: >-
          Controlled shutdown in progress. May include cooldown,
          gas purging, and depressurization phases.
      standby:
        display_name: Standby
        description: >-
          Power generation automatically paused due to process
          conditions such as low hydrogen supply pressure or battery
          voltage threshold. Will resume autonomously when conditions
          allow.
      derated:
        display_name: Derated
        description: >-
          Generating at reduced output due to stack degradation,
          hydrogen supply limitations, or temperature constraints.
          The fuel cell is operational but cannot deliver full rated
          power.
      fault:
        display_name: Fault
        description: >-
          A condition prevents normal operation. Operator intervention
          or an automated reset is required before the fuel cell
          can return to service.
      maintenance:
        display_name: Maintenance
        description: >-
          Operator-initiated service mode. The fuel cell is intentionally
          taken out of normal operation for inspection or servicing.
  status:
    display_name: Status
    type: string
    enum:
      inactive:
        display_name: Inactive
        color: green-lighter
      standby:
        display_name: Standby
        color: cyan-dark
      run:
        display_name: Run
        color: green
      fault:
        display_name: Fault
        color: red
      conn_error:
        display_name: Connection Error
        color: red
  powered:
    display_name: Powered
    type: boolean
  started:
    display_name: Started
    type: boolean
  output_voltage:
    type: float
    unit: V
    display_name: Output Voltage
  output_current:
    type: float
    unit: A
    display_name: Output Current
  output_power:
    type: float
    unit: W
    display_name: Output Power
  h2_inlet_pressure:
    type: float
    unit: mbar
    display_name: Hydrogen Inlet Pressure
  inlet_temperature:
    type: float
    unit: Cel
    display_name: Inlet Temperature
  outlet_temperature:
    type: float
    unit: Cel
    display_name: Outlet Temperature
  output_voltage_setpoint:
    type: float
    unit: V
    display_name: DC/DC Voltage Set Point
  output_current_limit:
    type: float
    unit: A
    display_name: DC/DC Current Limit
  louver_pos:
    type: float
    unit: "%"
    display_name: Louver Position Open
  cooling_control_duty:
    type: float
    unit: "%"
    display_name: Cooling Control Duty
  run_hours_lifetime:
    type: float
    unit: h
    display_name: Run Hours Lifetime
    implements: lib.energy.fuel_cell.run_hours.lifetime.run_hours_lifetime
  run_hours:
    type: float
    unit: s
    display_name: Run Hours
  energy_generated_lifetime:
    type: float
    unit: Wh
    display_name: Energy Generated Lifetime
  total_run_energy:
    type: float
    unit: J
    display_name: Total Run Energy
  fault_flags_a:
    type: integer
    display_name: Fault Flags A
  fault_flags_b:
    type: integer
    display_name: Fault Flags B
  fault_flags_c:
    type: integer
    display_name: Fault Flags C
  fault_flags_d:
    type: integer
    display_name: Fault Flags D
  messages_0x400:
    type: string
    display_name: CAN Messages 0x400
    description: Troubleshooting logs for analysis by Intelligent Energy service team
  conn_alerts:
    type: alerts
    display_name: Device Connection Alerts
    description: Alerts for communication issues

commands:
  start:
    display_name: Start
    group: fuel_cell
    ui:
      icon: play-circle
      quick_access: true
  stop:
    display_name: Stop
    group: fuel_cell
    ui:
      icon: stop-circle
      quick_access: true
  power_on:
    display_name: Power On
    group: fuel_cell
    ui:
      icon: power-on
      quick_access: true
  power_off:
    display_name: Power Off
    group: fuel_cell
    ui:
      icon: power-off
      quick_access: true

command_groups:
  fuel_cell:
    display_name: Fuel Cell

alerts:
  not_configured:
    severity: info
    display_name: Not Configured
    description: Use Device Settings to configure connection parameters.
  communication_failed:
    severity: error
    display_name: Device Communication Failed
    description: Failed to communicate with device.
    grace_period: 15s
    troubleshooting:
      - Check the CAN bus wiring and termination resistors.
      - Ensure the CAN bus baud rate matches the device configuration.
      - Verify the CAN Index parameter matches the factory-configured value.
